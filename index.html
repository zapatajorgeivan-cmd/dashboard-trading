<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Cuantitativo - Alta Frecuencia</title>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    
    <style>
        body { font-family: sans-serif; background-color: #1e222d; color: #d1d4dc; display: flex; justify-content: center; padding-top: 30px; margin: 0;}
        .dashboard-container { width: 95%; max-width: 1200px; background: #131722; padding: 30px; border-radius: 8px; border: 1px solid #2a2e39; margin-bottom: 50px;}
        .header-section { display: flex; flex-direction: row; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; gap: 20px;}
        .controles-izq, .controles-der { display: flex; flex-direction: column; }
        h2 { margin: 0 0 5px 0; font-weight: 300; color: #ffffff;}
        .instruccion-presentador { color: #ffeb3b; font-size: 12px; margin-bottom: 15px; font-style: italic; }
        .chart-title { color: #8a919e; margin: 30px 0 10px 0; font-size: 1.1rem; font-weight: normal;}
        
        select { width: 250px; padding: 12px; border-radius: 6px; border: 1px solid #2a2e39; background-color: #1e222d; color: #d1d4dc; font-size: 15px; cursor: pointer; }
        select:focus { outline: none; border-color: #2962FF; }
        label { margin-bottom: 8px; font-size: 13px; color: #8a919e; text-transform: uppercase; letter-spacing: 1px;}
        
        #metricasPanel { margin: 20px 0; padding: 15px; background: #1e222d; border-radius: 8px; border: 1px solid #2a2e39; font-size: 15px; text-align: center; color: #d1d4dc;}
        .caja-grafica { width: 100%; height: 400px; position: relative; border: 1px solid #2a2e39; border-radius: 4px; background-color: #131722;}
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header-section">
        <div class="controles-izq">
            <h2>Panel de Rendimiento Algorítmico</h2>
            <div class="instruccion-presentador">💡 Tip de Presentación: Mantén presionada la tecla SHIFT y haz clic en la gráfica para trazar líneas manuales.</div>
            <label>Modelo Operativo</label>
            <select id="configSelector" onchange="actualizarGrafica()">
                <option value="" selected disabled>-- Selecciona un Código --</option>
                            <option value="TC13-C101">TC13-C101</option>
            <option value="TC13-C102">TC13-C102</option>
            <option value="TC13-C103">TC13-C103</option>
            <option value="TC13-C104">TC13-C104</option>
            <option value="TC13-C105">TC13-C105</option>
            <option value="TC13-C106">TC13-C106</option>
            <option value="TC13-C107">TC13-C107</option>
            <option value="TC13-C108">TC13-C108</option>
            <option value="TC13-C109">TC13-C109</option>
            <option value="TC13-C110">TC13-C110</option>
            <option value="TC13-C111">TC13-C111</option>
            <option value="TC13-C112">TC13-C112</option>
            <option value="TC13-C113">TC13-C113</option>
            <option value="TC13-C114">TC13-C114</option>
            <option value="TC13-C115">TC13-C115</option>
            <option value="TC13-C116">TC13-C116</option>
            <option value="TC13-C117">TC13-C117</option>
            <option value="TC13-C118">TC13-C118</option>
            <option value="TC13-C119">TC13-C119</option>
            <option value="TC13-C120">TC13-C120</option>
            <option value="TC13-D121">TC13-D121</option>
            <option value="TC13-D122">TC13-D122</option>
            <option value="TC13-D123">TC13-D123</option>
            <option value="TC13-D124">TC13-D124</option>
            <option value="TC13-D125">TC13-D125</option>
            <option value="TC13-D126">TC13-D126</option>
            <option value="TC13-D127">TC13-D127</option>
            <option value="TC13-D128">TC13-D128</option>
            <option value="TC13-D129">TC13-D129</option>
            <option value="TC13-D130">TC13-D130</option>
            <option value="TC13-D131">TC13-D131</option>
            <option value="TC13-D132">TC13-D132</option>
            <option value="TC13-D133">TC13-D133</option>
            <option value="TC13-D134">TC13-D134</option>
            <option value="TC13-D135">TC13-D135</option>
            <option value="TC13-D136">TC13-D136</option>
            <option value="TC13-D137">TC13-D137</option>
            <option value="TC13-D138">TC13-D138</option>
            <option value="TC13-D139">TC13-D139</option>
            <option value="TC13-D140">TC13-D140</option>
            <option value="TC13-D141">TC13-D141</option>
            <option value="TC13-D142">TC13-D142</option>
            <option value="TC13-D143">TC13-D143</option>
            <option value="TC13-D144">TC13-D144</option>
            <option value="TC13-D145">TC13-D145</option>
            <option value="TC13-D146">TC13-D146</option>
            <option value="TC13-D147">TC13-D147</option>
            <option value="TC13-D148">TC13-D148</option>
            <option value="TC13-D149">TC13-D149</option>
            <option value="TC13-D150">TC13-D150</option>
            </select>
        </div>
        <div class="controles-der">
            <label>Risk Appetite (Crypto)</label>
            <select id="riskSelector" onchange="actualizarLineaRiesgo()">
                <option value="-10">Conservative (-10%)</option>
                <option value="-20">Moderate (-20%)</option>
                <option value="-30">Aggressive (-30%)</option>
                <option value="-40">High Risk (-40%)</option>
                <option value="-50">Extreme (-50%)</option>
            </select>
        </div>
    </div>
    
    <div class="chart-title">Curva de Drawdown Histórico</div>
    <div id="contenedorDrawdown" class="caja-grafica"></div>
    
    <div id="metricasPanel">
        <strong>Métricas del Modelo:</strong> Sharpe: <span id="valSharpe">-</span> | Profit Factor: <span id="valPF">-</span> | Calmar: <span id="valCalmar">-</span>
    </div>

    <div class="chart-title">Equity Curve/Curva de Capital real</div>
    <div id="contenedorEquity" class="caja-grafica"></div>
</div>

<script>
    let lineaDrawdown, lineaEquity;
    let chartDd, chartEq;
    let lineaRiesgoActual = null;
    let lineasManuales = []; 
    
    // RASTREADOR GLOBAL DEL TECLADO (Solución al Bug del Shift)
    let teclaShiftPresionada = false;
    window.addEventListener('keydown', function(event) { if (event.shiftKey) teclaShiftPresionada = true; });
    window.addEventListener('keyup', function(event) { if (!event.shiftKey) teclaShiftPresionada = false; });

    function iniciarGraficas() {
        const opcionesComunes = {
            layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            timeScale: { timeVisible: true, borderColor: '#2a2e39' }
        };

        chartDd = LightweightCharts.createChart(document.getElementById('contenedorDrawdown'), opcionesComunes);
        chartEq = LightweightCharts.createChart(document.getElementById('contenedorEquity'), opcionesComunes);

        // Curva de Drawdown (Sombreado invertido y punto hueco)
        lineaDrawdown = chartDd.addBaselineSeries({ 
            baseValue: { type: 'price', price: 0 }, 
            bottomLineColor: '#EF5350',
            bottomFillColor1: 'rgba(239, 83, 80, 0)',   
            bottomFillColor2: 'rgba(239, 83, 80, 0.4)', 
            topLineColor: '#EF5350',
            topFillColor1: 'rgba(239, 83, 80, 0.4)',
            topFillColor2: 'rgba(239, 83, 80, 0)',
            lineWidth: 2,
            crosshairMarkerRadius: 5, 
            crosshairMarkerBorderColor: '#EF5350', 
            crosshairMarkerBackgroundColor: '#131722', 
            crosshairMarkerBorderWidth: 2
        });
        
        // Curva de Equity (Área normal y punto hueco)
        lineaEquity = chartEq.addAreaSeries({ 
            lineColor: '#2962FF', topColor: 'rgba(41, 98, 255, 0.4)', bottomColor: 'rgba(41, 98, 255, 0)', lineWidth: 2,
            crosshairMarkerRadius: 5, 
            crosshairMarkerBorderColor: '#2962FF', 
            crosshairMarkerBackgroundColor: '#131722', 
            crosshairMarkerBorderWidth: 2
        });

        // Líneas Base Fijas (Grosor 3)
        lineaDrawdown.createPriceLine({ price: 0, color: '#5d606b', lineWidth: 3, lineStyle: LightweightCharts.LineStyle.Solid, axisLabelVisible: false });
        lineaEquity.createPriceLine({ price: 10000, color: '#5d606b', lineWidth: 3, lineStyle: LightweightCharts.LineStyle.Solid, axisLabelVisible: false });

        actualizarLineaRiesgo();

        // Sincronización Cruzada
        chartEq.timeScale().subscribeVisibleLogicalRangeChange(range => { chartDd.timeScale().setVisibleLogicalRange(range); });
        chartDd.timeScale().subscribeVisibleLogicalRangeChange(range => { chartEq.timeScale().setVisibleLogicalRange(range); });

        // OYENTES DE CLIC CON VERIFICACIÓN GLOBAL DEL TECLADO
        chartEq.subscribeClick(function(param) {
            if (teclaShiftPresionada && param.point) {
                const precio = lineaEquity.coordinateToPrice(param.point.y);
                const nuevaLinea = lineaEquity.createPriceLine({
                    price: precio, color: '#ffeb3b', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Solid, title: 'Nota'
                });
                lineasManuales.push({ serie: lineaEquity, linea: nuevaLinea });
            }
        });

        chartDd.subscribeClick(function(param) {
            if (teclaShiftPresionada && param.point) {
                const precio = lineaDrawdown.coordinateToPrice(param.point.y);
                const nuevaLinea = lineaDrawdown.createPriceLine({
                    price: precio, color: '#ffeb3b', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Solid, title: 'Nota'
                });
                lineasManuales.push({ serie: lineaDrawdown, linea: nuevaLinea });
            }
        });
    }

    function actualizarLineaRiesgo() {
        const valorRiesgo = parseFloat(document.getElementById("riskSelector").value);
        if (lineaRiesgoActual !== null) { lineaDrawdown.removePriceLine(lineaRiesgoActual); }
        lineaRiesgoActual = lineaDrawdown.createPriceLine({
            price: valorRiesgo, 
            color: '#ffb74d', 
            lineWidth: 2, // Grosor 2 solicitado para la tolerancia de riesgo
            lineStyle: LightweightCharts.LineStyle.Dashed, 
            axisLabelVisible: true, 
            title: 'Risk Tolerance (' + valorRiesgo + '%)'
        });
    }

    function limpiarLineasManuales() {
        lineasManuales.forEach(item => item.serie.removePriceLine(item.linea));
        lineasManuales = [];
    }

    async function actualizarGrafica() {
        const seleccion = document.getElementById("configSelector").value;
        if (!seleccion) return;

        try {
            const respuesta = await fetch(`datos/${seleccion}.json`);
            const dataJson = await respuesta.json();
            
            lineaDrawdown.setData(dataJson.drawdown_data);
            lineaEquity.setData(dataJson.equity_data);
            
            chartDd.timeScale().fitContent();
            chartEq.timeScale().fitContent();

            document.getElementById('valSharpe').innerText = dataJson.metricas.sharpe;
            document.getElementById('valPF').innerText = dataJson.metricas.profit_factor;
            document.getElementById('valCalmar').innerText = dataJson.metricas.calmar;

            limpiarLineasManuales();

        } catch(e) { 
            console.error("Error cargando datos", e);
        }
    }

    window.onload = iniciarGraficas;
</script>
</body>
</html>
